<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Flag Spotter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <div>
    <h1>Flag Spotter</h1>
    <p class="subtitle">Select flags that you have seen in your city during the walk!</p>
  </div>

  <div class="header-actions">
    <input type="text" id="search" placeholder="Search countries..." />
    <button id="reset-button">Reset</button>
  </div>

  <div id="counter">0 / 252 seen</div>
</header>



<main>
  <div class="content">
    <ul id="flag-list" class="flag-grid"></ul>
  </div>
</main>

<footer>
  <div class="content">
    <h2>World Map</h2>
    <object
      id="map"
      type="image/svg+xml"
      data="assets/world_map.svg"
      width="100%"
      height="500"
    ></object>
  </div>
</footer>

    <script src="script.js"></script>
</body>
</html>
